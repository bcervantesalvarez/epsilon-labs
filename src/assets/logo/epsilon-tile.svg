<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Epsilon Labs">
  <!-- App-icon style tile: deep ink, a whisper of accent glow from the
       top-right (same atmosphere as the site's dark bands), cream
       lunate epsilon, status-green data point. Fixed colors — this
       variant is for contexts that can't inherit the site's tokens. -->
