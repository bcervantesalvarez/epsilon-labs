    <radialGradient id="el-glow" cx="78%" cy="12%" r="90%">
      <stop offset="0%" stop-color="#8bb0dc" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#8bb0dc" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8bb0dc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f1115"/>
  <rect width="64" height="64" rx="14" fill="url(#el-glow)"/>
  <path d="M46 15.5 A16.5 16.5 0 1 0 46 48.5" fill="none" stroke="#fbfaf7" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M19.5 32 H41.5" fill="none" stroke="#fbfaf7" stroke-width="6.5" stroke-linecap="round"/>
